<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomagocha</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <h1 id="toma"> Hello, I'm your Tomagocha! </h1> <h3 id="reacth3">Interact with Kitty</h3>
   <div class="creature">
    <img id="happy" src="media/happy.png" alt="Kitty">

    <div class="kitty-btn">
        <button class="btn sad-btn" onclick="toSad()">Give kitty homework</button>
<button class="btn angry-btn" onclick="toAngry()">Spray water on kitty</button>
<button class="btn happy-btn" onclick="toHappy()">Pet Kitty</button>
<button class="btn feed-btn" onclick="resetBar()">Feed Kitty</button>
    </div>

    <div class="bar-container">
        <div id="bar" class="bar-fill"></div>
        <span id="bar-text">100%</span>
    </div>
</div>
</body>

</html>
