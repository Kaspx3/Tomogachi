<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomagocha</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <h1 id="toma">
        Hello, I'm your Tomagocha!
    </h1>
    <div class="thething">
        <div id="creature">
            <image id="happy" src="media/happy.png"></image>
            <div class="kitty-btn">
                <button id="btn" onclick="toSad()">Button of sadness</button>
                <button id="btn" onclick="toAngry()">Spray the kitty with water!</button>
                <button id="btn" onclick="toHappy()">Pet the kitty</button>
            </div>
        </div>


        <div id="mood"></div>
    </div>
</body>

</html>
